<svg xmlns="http://www.w3.org/2000/svg" width="980" height="640" viewBox="0 0 980 640" font-family="'Aptos','Segoe UI',sans-serif">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0d2a31" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowDown" markerWidth="9" markerHeight="9" refX="4.5" refY="7.5" orient="auto">
      <path d="M0 0 L4.5 7.5 L9 0" fill="none" stroke="#5f747a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowIn" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0 0 L7.5 4.5 L0 9" fill="none" stroke="#5f747a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="980" height="640" fill="#fbfcfc"/>

  <!-- Title -->
  <text x="490" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="#173640">Nested Harness Model</text>
  <text x="490" y="69" text-anchor="middle" font-size="13" font-style="italic" fill="#5f747a">Read outside to inside: operating setup wraps the product/change</text>
  <line x1="40" y1="88" x2="940" y2="88" stroke="#e3ebed" stroke-width="1.5"/>

  <!-- ===== Reversed containment model ===== -->
  <!-- L1 Agent/app harness: outer operating shell -->
  <rect x="30" y="117" width="580" height="470" rx="26" fill="#e8f4f6" stroke="#187078" stroke-width="2.4" filter="url(#softShadow)"/>
  <!-- L2 Team environment -->
  <rect x="86" y="162" width="468" height="380" rx="24" fill="#fff3e0" stroke="#c47530" stroke-width="2.4"/>
  <!-- L3 Project operating -->
  <rect x="142" y="207" width="356" height="290" rx="22" fill="#e3f3f4" stroke="#20808d" stroke-width="2.4"/>
  <!-- L4 Solution architecture -->
  <rect x="198" y="252" width="244" height="200" rx="20" fill="#eceef0" stroke="#607d8b" stroke-width="2.4"/>
  <!-- L5 Product-as-harness -->
  <rect x="250" y="292" width="140" height="120" rx="16" fill="#123d46" stroke="#0b2a31" stroke-width="2"/>

  <!-- Ring labels (left-aligned in each top band) -->
  <text x="48"  y="142" font-size="12" font-weight="700" fill="#187078">1 · Agent / app harness</text>
  <text x="104" y="187" font-size="12" font-weight="700" fill="#c47530">2 · Team environment harness</text>
  <text x="160" y="232" font-size="12" font-weight="700" fill="#20808d">3 · Project operating harness</text>
  <text x="216" y="277" font-size="12" font-weight="700" fill="#607d8b">4 · Solution architecture harness</text>
  <text x="266" y="313" font-size="11" font-weight="700" fill="#d6ecef">5 · Product-as-harness</text>

  <!-- Core outcome -->
  <text x="320" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Usable</text>
  <text x="320" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">product/change</text>
  <text x="320" y="390" text-anchor="middle" font-size="9.5" fill="#9ec9cf">future work · less ambiguity</text>

  <!-- Direction cue: setup narrows into product/change -->
  <path d="M 72 555 C 155 520, 210 470, 266 407" fill="none" stroke="#7d9298" stroke-width="1.6"
        stroke-dasharray="5 4" stroke-linecap="round" marker-end="url(#arrowIn)"/>
  <text x="72" y="571" font-size="9.5" font-style="italic" fill="#7d9298">setup wraps inward toward the usable change</text>

  <!-- ===== Right rail: layer roles, ordered outer -> inner ===== -->
  <line x1="662" y1="124" x2="662" y2="556" stroke="#b9c8cc" stroke-width="2" marker-end="url(#arrowIn)"/>
  <text x="652" y="340" font-size="10" font-weight="600" fill="#7d9298" transform="rotate(-90 652 340)" text-anchor="middle">outer operating setup  →  inner product/change</text>

  <g>
    <!-- 1 Agent/app -->
    <rect x="682" y="118" width="270" height="70" rx="10" fill="#ffffff" stroke="#e1eaec" stroke-width="1.2"/>
    <rect x="690" y="132" width="7" height="42" rx="3.5" fill="#187078"/>
    <text x="706" y="142" font-size="11.5" font-weight="700" fill="#173640">Agent / app harness</text>
    <text x="706" y="158" font-size="9.3" fill="#5f747a">Tools, permissions, memory, files,</text>
    <text x="706" y="170" font-size="9.3" fill="#5f747a">skills, and local runtime boundaries.</text>

    <!-- 2 Team environment -->
    <rect x="682" y="195" width="270" height="70" rx="10" fill="#ffffff" stroke="#e1eaec" stroke-width="1.2"/>
    <rect x="690" y="209" width="7" height="42" rx="3.5" fill="#c47530"/>
    <text x="706" y="219" font-size="11.5" font-weight="700" fill="#173640">Team environment harness</text>
    <text x="706" y="235" font-size="9.3" fill="#5f747a">Repos, auth conventions, shared docs,</text>
    <text x="706" y="247" font-size="9.3" fill="#5f747a">ownership, operating rules, live systems.</text>

    <!-- 3 Project operating -->
    <rect x="682" y="272" width="270" height="70" rx="10" fill="#ffffff" stroke="#e1eaec" stroke-width="1.2"/>
    <rect x="690" y="286" width="7" height="42" rx="3.5" fill="#20808d"/>
    <text x="706" y="296" font-size="11.5" font-weight="700" fill="#173640">Project operating harness</text>
    <text x="706" y="312" font-size="9.3" fill="#5f747a">Instructions, backlog, decisions, tests,</text>
    <text x="706" y="324" font-size="9.3" fill="#5f747a">runbooks, diagrams, restart points.</text>

    <!-- 4 Solution architecture -->
    <rect x="682" y="349" width="270" height="70" rx="10" fill="#ffffff" stroke="#e1eaec" stroke-width="1.2"/>
    <rect x="690" y="363" width="7" height="42" rx="3.5" fill="#607d8b"/>
    <text x="706" y="373" font-size="11.5" font-weight="700" fill="#173640">Solution architecture harness</text>
    <text x="706" y="389" font-size="9.3" fill="#5f747a">System design, data flow, interfaces,</text>
    <text x="706" y="401" font-size="9.3" fill="#5f747a">risks, and verification strategy.</text>

    <!-- 5 Product -->
    <rect x="682" y="426" width="270" height="70" rx="10" fill="#ffffff" stroke="#e1eaec" stroke-width="1.2"/>
    <rect x="690" y="440" width="7" height="42" rx="3.5" fill="#123d46"/>
    <text x="706" y="450" font-size="11.5" font-weight="700" fill="#173640">Product-as-harness</text>
    <text x="706" y="466" font-size="9.3" fill="#5f747a">The finished product or workflow helps</text>
    <text x="706" y="478" font-size="9.3" fill="#5f747a">future users solve the work cleanly.</text>

    <!-- focused lane -->
    <rect x="682" y="503" width="270" height="58" rx="10" fill="#0e333b" stroke="#0b2a31" stroke-width="1.2"/>
    <rect x="690" y="515" width="7" height="34" rx="3.5" fill="#46b39d"/>
    <text x="706" y="525" font-size="11.5" font-weight="700" fill="#ffffff">Focused execution lane</text>
    <text x="706" y="541" font-size="9.3" fill="#9ec9cf">Plan · execute · verify against evidence.</text>
    <text x="706" y="553" font-size="9.3" fill="#9ec9cf">Park everything outside the lane.</text>
  </g>

  <!-- Footer rule -->
  <rect x="30" y="600" width="580" height="30" rx="15" fill="#ffffff" stroke="#e1eaec" stroke-width="1.2"/>
  <text x="320" y="619" text-anchor="middle" font-size="10.5" fill="#3a565d">Use only the layers needed; outer layers clarify, protect, and constrain the work inside.</text>
</svg>

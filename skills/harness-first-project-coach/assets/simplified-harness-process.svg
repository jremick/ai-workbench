<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" font-family="'Aptos','Segoe UI',sans-serif">
  <defs>
    <filter id="cs" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0d2a31" flood-opacity="0.10"/>
    </filter>
    <marker id="flow" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#516a70"/>
    </marker>
    <marker id="loop" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#b5683f"/>
    </marker>
    <marker id="pass" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#256d5a"/>
    </marker>
  </defs>

  <rect width="1120" height="600" fill="#fbfcfc"/>

  <text x="560" y="44" text-anchor="middle" font-size="25" font-weight="700" fill="#173640">Harness-First Process</text>
  <text x="560" y="66" text-anchor="middle" font-size="12.5" font-style="italic" fill="#5f747a">Three controls gate the flow: a Q&amp;A gate, support chosen by need, and evidence that decides progress</text>
  <line x1="40" y1="84" x2="1080" y2="84" stroke="#e3ebed" stroke-width="1.5"/>

  <!-- ============ Q&A GATE (first-class entry gate) ============ -->
  <text x="97" y="138" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1.5" fill="#cf6f35">CONTROL 1 · GATE</text>
  <rect x="44" y="150" width="106" height="160" rx="14" fill="#fdf1e8" stroke="#cf6f35" stroke-width="2.2" filter="url(#cs)"/>
  <!-- portcullis glyph -->
  <g stroke="#cf6f35" stroke-width="2" stroke-linecap="round">
    <line x1="66" y1="172" x2="128" y2="172"/>
    <line x1="74" y1="172" x2="74" y2="206"/>
    <line x1="89" y1="172" x2="89" y2="206"/>
    <line x1="104" y1="172" x2="104" y2="206"/>
    <line x1="119" y1="172" x2="119" y2="206"/>
  </g>
  <text x="97" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#173640">Q&amp;A gate</text>
  <text x="97" y="256" text-anchor="middle" font-size="9" fill="#6b4326">Ask only what</text>
  <text x="97" y="268" text-anchor="middle" font-size="9" fill="#6b4326">changes the</text>
  <text x="97" y="280" text-anchor="middle" font-size="9" fill="#6b4326">harness.</text>
  <text x="97" y="300" text-anchor="middle" font-size="8.5" font-style="italic" fill="#a07a5e">safe &amp; reversible? proceed</text>

  <!-- entry arrow -->
  <line x1="150" y1="230" x2="167" y2="230" stroke="#516a70" stroke-width="2" marker-end="url(#flow)"/>

  <!-- ============ STEP CARDS ============ -->
  <!-- helper note: header path = top-rounded rect; bodies below -->

  <!-- 1 Clarify -->
  <rect x="170" y="170" width="116" height="120" rx="12" fill="#ffffff" stroke="#e6eef0" stroke-width="1.2" filter="url(#cs)"/>
  <path d="M170 198 L170 182 Q170 170 182 170 L274 170 Q286 170 286 182 L286 198 Z" fill="#cf6f35"/>
  <rect x="170" y="194" width="116" height="14" fill="#cf6f35"/>
  <circle cx="186" cy="189" r="9" fill="#ffffff"/><text x="186" y="193" text-anchor="middle" font-size="11" font-weight="700" fill="#cf6f35">1</text>
  <text x="201" y="193" font-size="11.5" font-weight="700" fill="#ffffff">Clarify</text>
  <text x="180" y="226" font-size="8.7" fill="#3a565d">Goal, outcomes,</text>
  <text x="180" y="238" font-size="8.7" fill="#3a565d">success criteria,</text>
  <text x="180" y="250" font-size="8.7" fill="#3a565d">assumptions,</text>
  <text x="180" y="262" font-size="8.7" fill="#3a565d">environment,</text>
  <text x="180" y="274" font-size="8.7" fill="#3a565d">constraints.</text>
  <line x1="286" y1="230" x2="300" y2="230" stroke="#516a70" stroke-width="2" marker-end="url(#flow)"/>

  <!-- 2 Ground -->
  <rect x="302" y="170" width="116" height="120" rx="12" fill="#ffffff" stroke="#e6eef0" stroke-width="1.2" filter="url(#cs)"/>
  <path d="M302 198 L302 182 Q302 170 314 170 L406 170 Q418 170 418 182 L418 198 Z" fill="#6d8d99"/>
  <rect x="302" y="194" width="116" height="14" fill="#6d8d99"/>
  <circle cx="318" cy="189" r="9" fill="#ffffff"/><text x="318" y="193" text-anchor="middle" font-size="11" font-weight="700" fill="#6d8d99">2</text>
  <text x="333" y="193" font-size="11.5" font-weight="700" fill="#ffffff">Ground</text>
  <text x="312" y="226" font-size="8.7" fill="#3a565d">Inspect the</text>
  <text x="312" y="238" font-size="8.7" fill="#3a565d">source of truth;</text>
  <text x="312" y="250" font-size="8.7" fill="#3a565d">separate evidence</text>
  <text x="312" y="262" font-size="8.7" fill="#3a565d">from inference.</text>
  <line x1="418" y1="230" x2="432" y2="230" stroke="#516a70" stroke-width="2" marker-end="url(#flow)"/>

  <!-- 3 Choose support -->
  <rect x="434" y="170" width="116" height="120" rx="12" fill="#ffffff" stroke="#e6eef0" stroke-width="1.2" filter="url(#cs)"/>
  <path d="M434 202 L434 182 Q434 170 446 170 L538 170 Q550 170 550 182 L550 202 Z" fill="#0f7f87"/>
  <rect x="434" y="196" width="116" height="14" fill="#0f7f87"/>
  <circle cx="450" cy="187" r="9" fill="#ffffff"/><text x="450" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#0f7f87">3</text>
  <text x="465" y="186" font-size="11" font-weight="700" fill="#ffffff">Choose</text>
  <text x="465" y="200" font-size="11" font-weight="700" fill="#ffffff">support</text>
  <text x="444" y="228" font-size="8.7" fill="#3a565d">Pick skills,</text>
  <text x="444" y="240" font-size="8.7" fill="#3a565d">workflows, or</text>
  <text x="444" y="252" font-size="8.7" fill="#3a565d">validators that</text>
  <text x="444" y="264" font-size="8.7" fill="#3a565d">fit before</text>
  <text x="444" y="276" font-size="8.7" fill="#3a565d">creating new.</text>
  <line x1="550" y1="230" x2="564" y2="230" stroke="#516a70" stroke-width="2" marker-end="url(#flow)"/>

  <!-- 4 Design harness -->
  <rect x="566" y="170" width="116" height="120" rx="12" fill="#ffffff" stroke="#e6eef0" stroke-width="1.2" filter="url(#cs)"/>
  <path d="M566 202 L566 182 Q566 170 578 170 L670 170 Q682 170 682 182 L682 202 Z" fill="#123d46"/>
  <rect x="566" y="196" width="116" height="14" fill="#123d46"/>
  <circle cx="582" cy="187" r="9" fill="#ffffff"/><text x="582" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#123d46">4</text>
  <text x="597" y="186" font-size="11" font-weight="700" fill="#ffffff">Design</text>
  <text x="597" y="200" font-size="11" font-weight="700" fill="#ffffff">harness</text>
  <text x="576" y="228" font-size="8.7" fill="#3a565d">Build the</text>
  <text x="576" y="240" font-size="8.7" fill="#3a565d">smallest</text>
  <text x="576" y="252" font-size="8.7" fill="#3a565d">operating loop</text>
  <text x="576" y="264" font-size="8.7" fill="#3a565d">that cuts</text>
  <text x="576" y="276" font-size="8.7" fill="#3a565d">execution risk.</text>
  <line x1="682" y1="230" x2="696" y2="230" stroke="#516a70" stroke-width="2" marker-end="url(#flow)"/>

  <!-- 5 Execute one lane -->
  <rect x="698" y="170" width="116" height="120" rx="12" fill="#ffffff" stroke="#e6eef0" stroke-width="1.2" filter="url(#cs)"/>
  <path d="M698 202 L698 182 Q698 170 710 170 L802 170 Q814 170 814 182 L814 202 Z" fill="#3f7f8f"/>
  <rect x="698" y="196" width="116" height="14" fill="#3f7f8f"/>
  <circle cx="714" cy="187" r="9" fill="#ffffff"/><text x="714" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#3f7f8f">5</text>
  <text x="729" y="186" font-size="11" font-weight="700" fill="#ffffff">Execute</text>
  <text x="729" y="200" font-size="11" font-weight="700" fill="#ffffff">one lane</text>
  <text x="708" y="228" font-size="8.7" fill="#3a565d">Plan, execute,</text>
  <text x="708" y="240" font-size="8.7" fill="#3a565d">verify. Park</text>
  <text x="708" y="252" font-size="8.7" fill="#3a565d">adjacent ideas</text>
  <text x="708" y="264" font-size="8.7" fill="#3a565d">instead of</text>
  <text x="708" y="276" font-size="8.7" fill="#3a565d">widening scope.</text>
  <line x1="814" y1="230" x2="828" y2="230" stroke="#516a70" stroke-width="2" marker-end="url(#flow)"/>

  <!-- ============ EVIDENCE GATE (controls progress) ============ -->
  <text x="872" y="138" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1.2" fill="#256d5a">CONTROL 3 · EVIDENCE</text>
  <polygon points="872,184 920,230 872,276 824,230" fill="#eef5f1" stroke="#256d5a" stroke-width="2.2" filter="url(#cs)"/>
  <text x="872" y="226" text-anchor="middle" font-size="10.5" font-weight="700" fill="#173640">Evidence</text>
  <text x="872" y="240" text-anchor="middle" font-size="10.5" font-weight="700" fill="#173640">holds?</text>
  <!-- pass -->
  <line x1="920" y1="230" x2="936" y2="230" stroke="#256d5a" stroke-width="2" marker-end="url(#pass)"/>
  <text x="918" y="222" font-size="8.5" font-weight="700" fill="#256d5a">yes</text>

  <!-- 6 Compound -->
  <rect x="938" y="170" width="116" height="120" rx="12" fill="#ffffff" stroke="#e6eef0" stroke-width="1.2" filter="url(#cs)"/>
  <path d="M938 198 L938 182 Q938 170 950 170 L1042 170 Q1054 170 1054 182 L1054 198 Z" fill="#256d5a"/>
  <rect x="938" y="194" width="116" height="14" fill="#256d5a"/>
  <circle cx="954" cy="189" r="9" fill="#ffffff"/><text x="954" y="193" text-anchor="middle" font-size="11" font-weight="700" fill="#256d5a">6</text>
  <text x="969" y="193" font-size="11.5" font-weight="700" fill="#ffffff">Compound</text>
  <text x="948" y="226" font-size="8.7" fill="#3a565d">Capture only</text>
  <text x="948" y="238" font-size="8.7" fill="#3a565d">reusable</text>
  <text x="948" y="250" font-size="8.7" fill="#3a565d">learning in the</text>
  <text x="948" y="262" font-size="8.7" fill="#3a565d">right artifact.</text>

  <!-- ============ CONTROL 2: support selected by need ============ -->
  <text x="492" y="324" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1.2" fill="#0f7f87">CONTROL 2 · SELECTION</text>
  <line x1="492" y1="290" x2="492" y2="332" stroke="#0f7f87" stroke-width="1.4" stroke-dasharray="3 3"/>
  <rect x="372" y="334" width="240" height="92" rx="12" fill="#eef7f7" stroke="#0f7f87" stroke-width="1.4"/>
  <text x="492" y="352" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0c5f66">Support skills — selected by need</text>
  <!-- chips -->
  <g font-size="9" font-weight="600">
    <rect x="386" y="362" width="100" height="22" rx="11" fill="#0f7f87"/><text x="436" y="377" text-anchor="middle" fill="#ffffff">✓ existing skill</text>
    <rect x="498" y="362" width="100" height="22" rx="11" fill="#0f7f87"/><text x="548" y="377" text-anchor="middle" fill="#ffffff">✓ team workflow</text>
    <rect x="386" y="390" width="100" height="22" rx="11" fill="#ffffff" stroke="#9bb9bd"/><text x="436" y="405" text-anchor="middle" fill="#7d9298">○ validator</text>
    <rect x="498" y="390" width="100" height="22" rx="11" fill="#ffffff" stroke="#9bb9bd"/><text x="548" y="405" text-anchor="middle" fill="#7d9298">○ new skill</text>
  </g>
  <text x="492" y="421" text-anchor="middle" font-size="8" font-style="italic" fill="#6b8086">selected ·  ·  · skipped — propose new only on a real reusable gap</text>

  <!-- ============ EVIDENCE FEEDBACK LOOP (controls progress) ============ -->
  <path d="M 872 276 L 872 506 L 228 506 L 228 292" fill="none" stroke="#b5683f" stroke-width="2"
        stroke-dasharray="6 4" stroke-linecap="round" marker-end="url(#loop)"/>
  <text x="864" y="296" font-size="8.5" font-weight="700" fill="#b5683f" text-anchor="end">no</text>
  <rect x="430" y="494" width="290" height="24" rx="12" fill="#fdf1e8" stroke="#e3b79b"/>
  <text x="575" y="510" text-anchor="middle" font-size="9.5" font-weight="600" fill="#9a4f25">Weak proof returns to Clarify or Design harness</text>
  <text x="575" y="540" text-anchor="middle" font-size="10.5" font-style="italic" fill="#5f747a">Evidence controls progress — the flow only advances on proof.</text>
</svg>

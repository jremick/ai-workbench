name: Validate Public Artifacts

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate model council package
        run: python3 scripts/validate_model_council_package.py

      - name: Validate model manager package
        run: python3 scripts/validate_model_manager_package.py

      - name: Run deterministic controls eval
        run: |
          cd skills/deterministic-controls
          python3 scripts/run_evals.py
